name: Run E2E Tests

on: [pull_request]

jobs:
  run-e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest

    services:
      image: bitnami/postgresql:latest
      ports:
        - 5432:5432
      container_name: postgres
      envgit :
        - POSTGRESQL_USER=postgres
        - POSTGRESQL_PASSWORD=postgres
        - POSTGRESQL_DATABASE=gympass

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - run: npm run test:e2e
        env: 
          JWT_SECRET: testing
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/gympass?schema=public"